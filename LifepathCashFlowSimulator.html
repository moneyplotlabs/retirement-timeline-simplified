<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Plot Labs - Lifepath Cash Flow Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1050px;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            color: var(--text-main);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .metric-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .metric-card.blue .metric-value {
            color: var(--accent-blue);
        }

        .layout-split {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-top: 20px;
        }

        @media (min-width: 900px) {
            .layout-split {
                grid-template-columns: 1.1fr 1fr;
            }
        }

        .chart-container {
            position: relative;
            height: 430px;
            width: 100%;
            background-color: rgba(15, 23, 42, 0.2);
            border-radius: 8px;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid var(--border);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: rgba(15, 23, 42, 0.3);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            max-height: 580px;
            overflow-y: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .milestone-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .milestone-block {
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            position: relative;
            transition: border-color 0.2s;
        }

        .milestone-block:hover {
            border-color: var(--accent-blue);
        }

        .milestone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .milestone-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-blue);
            letter-spacing: 0.05em;
        }

        .btn-add-event {
            background-color: transparent;
            color: var(--accent-green);
            border: 1px dashed var(--accent-green);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .control-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Standardized Input Styling for consistency */
        input[type="number"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        
        input[type="number"]:focus {
            border-color: var(--accent-blue);
        }

        .interactive-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .interactive-row input[type="range"] {
            flex: 1;
        }

        .interactive-row .manual-box {
            width: 110px;
            flex-shrink: 0;
            text-align: left;
        }

        .advanced-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(51, 65, 85, 0.3);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            user-select: none;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .advanced-toggle:hover {
            background: rgba(51, 65, 85, 0.5);
        }

        .advanced-toggle .chevron {
            transition: transform 0.2s ease;
            width: 12px;
            height: 12px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .advanced-toggle.open .chevron {
            transform: rotate(180deg);
        }

        .advanced-content {
            display: none;
            flex-direction: column;
            gap: 16px;
            border: 1px dashed var(--border);
            padding: 14px;
            border-radius: 6px;
            background: rgba(15, 23, 42, 0.2);
        }

        .advanced-content.visible {
            display: flex;
        }

        /* ADVANCED FLEX & GRID ROW ENGINE */
        .advanced-row-x {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            width: 100%;
        }

        .x-input-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex: 1;
        }

        .btn-lock {
            background-color: var(--accent-blue);
            color: var(--text-main);
            border: none;
            padding: 7px 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 115px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
            text-align: center;
        }

        .btn-lock:hover {
            background-color: #2563eb;
        }

        .btn-lock.locked {
            background-color: var(--accent-red);
            color: #fff;
            border: 1px solid var(--accent-red);
        }

        .btn-lock.locked:hover {
            background-color: rgba(239, 68, 68, 0.3);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .input-row:last-child { margin-bottom: 0; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-blue);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            padding: 4px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .btn-delete:hover { opacity: 1; }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.5;
            padding: 20px;
            text-align: center;
            border: 1px dashed var(--border);
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Money Plot Labs: Lifepath Cash Flow Simulator</h2>

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-label">Working Years Needed</div>
            <div id="metric-work-years" class="metric-value">0.0 Years</div>
        </div>
        <div class="metric-card blue">
            <div class="metric-label">Retirement Age Target</div>
            <div id="metric-retire-age" class="metric-value">Age --</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Peak Nest Egg Needed</div>
            <div id="metric-peak-nw" class="metric-value">$0</div>
        </div>
    </div>

    <div class="layout-split">
        <!-- Left Side: Chart Placeholder -->
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Stochastic Trajectory Projection</span>
                <button class="btn-lock" id="main-chart-lock" style="height: 28px; padding: 0 12px; font-size: 0.8rem; width: auto;">Lock Scale for Comparison</button>
            </div>
            <div class="chart-container">
                <canvas id="lifepathChart"></canvas>
                <!-- Center absolute overlay for initial state -->
                <div id="chart-loader" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;">
                    <span class="placeholder-text">Chart initialization pending engine logic...</span>
                </div>
            </div>
        </div>

        <!-- Right Side: Control Panel Placeholder -->
        <div class="controls">
            <div class="control-group">
                <label class="control-label">Current Age</label>
                <div class="interactive-row">
                    <input type="range" id="slider-start-age" min="0" max="100" value="30">
                    <input type="number" id="box-start-age" class="manual-box" min="0" max="100" value="30">
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">Life Expectancy</label>
                <div class="interactive-row">
                    <input type="range" id="slider-end-age" min="0" max="120" value="95">
                    <input type="number" id="box-end-age" class="manual-box" min="0" max="120" value="95">
                </div>
            </div>

            <div class="control-group">
                <label class="control-label" id="label-principal">Starting Balance: $0</label>
                <div class="interactive-row">
                    <input type="range" id="input-principal" min="0" max="1000000" step="10000" value="0">
                    <input type="number" id="box-principal" class="manual-box" min="0" step="1000" value="0" placeholder="$">
                </div>
            </div>

            <div class="control-group">
                <label class="control-label" id="label-growth">Real Growth Rate during accumulation: 3.0%</label>
                <div class="interactive-row">
                    <input type="range" id="input-growth" min="-3.0" max="7.0" step="0.5" value="3.0">
                    <input type="number" id="box-growth" class="manual-box" min="-5.0" max="15.0" step="0.1" value="3.0">
                </div>
            </div>

            <div class="advanced-toggle" id="advanced-button">
                <span>More Parameters</span>
                <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            
            <div class="advanced-content" id="advanced-panel">
                <div class="control-group">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label class="control-label" id="label-growth-dec">Real Growth Rate (Decumulation): 3.0%</label>
                        <button class="btn-lock" id="btn-link-rates" style="width: auto; height: 24px; padding: 0 8px; font-size: 0.75rem;">Link to Accumulation</button>
                    </div>
                    <div class="interactive-row">
                        <input type="range" id="input-growth-dec" min="-3.0" max="7.0" step="0.5" value="3.0">
                        <input type="number" id="box-growth-dec" class="manual-box" min="-5.0" max="15.0" step="0.1" value="3.0">
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label" id="label-legacy-floor">Desired Legacy Floor: $0</label>
                    <div class="interactive-row">
                        <input type="range" id="slider-legacy-floor" min="0" max="1000000" step="50000" value="0">
                        <input type="number" id="box-legacy-floor" class="manual-box" min="0" max="5000000" step="50000" value="0" placeholder="$">
                    </div>
                </div>

                <div class="advanced-row-x" style="margin-top: 8px;">
                    <div class="x-input-pair">
                        <div class="control-group">
                            <label class="control-label">Chart Min Age</label>
                            <input type="number" id="box-axis-min" min="0" max="100" value="" placeholder="Auto">
                        </div>
                        <div class="control-group">
                            <label class="control-label">Chart Max Age</label>
                            <input type="number" id="box-axis-max" min="30" max="150" value="" placeholder="Auto">
                        </div>
                    </div>
                </div>
                <button class="btn-lock" id="btn-lock-x" style="width: 100%; margin-top: 4px;">Lock Current X</button>

                <div class="control-group" style="margin-top: 8px;">
                    <label class="control-label">Chart Max Net Worth ($)</label>
                    <input type="number" id="box-y-max" step="100000" min="0" value="" placeholder="Auto (Peak Net Worth)">
                </div>
                <button class="btn-lock" id="btn-lock-y" style="width: 100%; margin-top: 4px;">Lock Current Y</button>

                <!-- External Cash Events -->
                <div class="control-group" style="margin-top: 12px; border-top: 1px dashed var(--border); padding-top: 12px;">
                    <label class="control-label">Social Security / Pension ($/yr)</label>
                    <div class="interactive-row">
                        <input type="number" id="box-ss-amt" class="manual-box" style="flex: 1;" value="0" step="1000" placeholder="Amount ($/yr)">
                        <input type="number" id="box-ss-age" class="manual-box" style="width: 80px;" value="67" min="0" max="100" placeholder="Age">
                    </div>
                </div>

                <div class="control-group" style="margin-top: 8px;">
                    <label class="control-label">One-time Windfall (e.g., Inheritance)</label>
                    <div class="interactive-row">
                        <input type="number" id="box-windfall-amt" class="manual-box" style="flex: 1;" value="0" step="5000" placeholder="Lump Sum ($)">
                        <input type="number" id="box-windfall-age" class="manual-box" style="width: 80px;" value="50" min="0" max="100" placeholder="Age">
                    </div>
                </div>
            </div>

            <div id="milestone-container" class="milestone-list"></div>
            <button id="add-event-btn" class="btn-add-event">+ Add Life Event (Milestone)</button>
        </div>
    </div>
</div>

<script>
    const milestoneContainer = document.getElementById('milestone-container');
    const addEventBtn = document.getElementById('add-event-btn');
    const loader = document.getElementById('chart-loader');

    const sliderStartAge = document.getElementById('slider-start-age');
    const boxStartAge = document.getElementById('box-start-age');
    const mWorkYears = document.getElementById('metric-work-years');
    const mRetireAge = document.getElementById('metric-retire-age');
    const mPeakNw = document.getElementById('metric-peak-nw');

    const sliderEndAge = document.getElementById('slider-end-age');
    const boxEndAge = document.getElementById('box-end-age');
    const inputPrincipal = document.getElementById('input-principal');
    const boxPrincipal = document.getElementById('box-principal');
    const inputGrowth = document.getElementById('input-growth');
    const boxGrowth = document.getElementById('box-growth');
    const inputGrowthDec = document.getElementById('input-growth-dec');
    const boxGrowthDec = document.getElementById('box-growth-dec');
    const btnLinkRates = document.getElementById('btn-link-rates');
    const btnAdvanced = document.getElementById('advanced-button');
    const panelAdvanced = document.getElementById('advanced-panel');
    const sliderLegacyFloor = document.getElementById('slider-legacy-floor');
    const boxLegacyFloor = document.getElementById('box-legacy-floor');
    const boxAxisMin = document.getElementById('box-axis-min');
    const boxAxisMax = document.getElementById('box-axis-max');
    const boxYMax = document.getElementById('box-y-max');
    const mainLockBtn = document.getElementById('main-chart-lock');
    const btnLockX = document.getElementById('btn-lock-x');
    const btnLockY = document.getElementById('btn-lock-y');
    
    const boxSsAmt = document.getElementById('box-ss-amt');
    const boxSsAge = document.getElementById('box-ss-age');
    const boxWindfallAmt = document.getElementById('box-windfall-amt');
    const boxWindfallAge = document.getElementById('box-windfall-age');

    let chartInstance = null;
    let ratesLinked = false;
    let computedPeakCache = 0;
    
    // Internal data structure
    let milestones = [];

    function initChart() {
        const ctx = document.getElementById('lifepathChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Inflow (Income)',
                        data: [],
                        backgroundColor: 'rgba(16, 185, 129, 0.6)',
                        borderColor: '#10b981',
                        borderWidth: 1,
                        stack: 'flow'
                    },
                    {
                        label: 'Outflow (Spending)',
                        data: [],
                        backgroundColor: 'rgba(239, 68, 68, 0.6)',
                        borderColor: '#ef4444',
                        borderWidth: 1,
                        stack: 'flow'
                    },
                    {
                        label: 'Projected Net Worth',
                        data: [],
                        type: 'line',
                        borderColor: '#3b82f6',
                        borderWidth: 3,
                        pointRadius: 0,
                        yAxisID: 'yNetWorth',
                        fill: false,
                        tension: 0.1,
                        zIndex: 10
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear',
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8', font: { size: 10 } },
                        title: { display: true, text: 'Age', color: '#94a3b8' }
                    },
                    y: {
                        stacked: false,
                        grid: { color: '#334155' },
                        beginAtZero: true,
                        ticks: { 
                            color: '#94a3b8',
                            callback: (v) => '$' + Math.abs(v).toLocaleString()
                        },
                        title: { display: true, text: 'Annual Cash Flow ($)', color: '#94a3b8' }
                    },
                    yNetWorth: {
                        position: 'right',
                        grid: { display: false },
                        min: 0,
                        ticks: {
                            color: '#3b82f6',
                            callback: (v) => v >= 1000000 ? '$' + (v / 1000000).toFixed(1) + 'M' : '$' + (v / 1000).toFixed(0) + 'k'
                        }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#f8fafc' } },
                    tooltip: {
                        callbacks: {
                            label: (context) => {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                label += '$' + Math.abs(context.raw).toLocaleString();
                                return label;
                            }
                        }
                    }
                }
            }
        });
        loader.style.display = 'none';
    }

    function getMilestone(age) {
        return milestones.filter(m => m.age <= age).pop() || milestones[0];
    }

    function simulateLife(startAge, endAge, principal, rAcc, rDec, rAge) {
        const ssAmt = parseFloat(boxSsAmt.value) || 0;
        const ssAge = parseInt(boxSsAge.value) || 0;
        const wAmt = parseFloat(boxWindfallAmt.value) || 0;
        const wAge = parseInt(boxWindfallAge.value) || 0;

        const labels = [];
        const inflowData = [];
        const outflowData = [];
        const nwData = [];
        
        let balance = principal;
        let peakNw = principal;

        const k = Math.floor(rAge);
        const delta = rAge - k;

        for (let t = startAge; t <= endAge; t++) {
            labels.push(t);
            nwData.push(balance);
            
            const m = getMilestone(t);
            const passive = (t >= ssAge) ? ssAmt : 0;
            const windfall = (t === wAge) ? wAmt : 0;

            if (t < k) {
                // Full working year
                inflowData.push(m.income + passive + windfall);
                outflowData.push(-m.spending);
                balance = balance * (1 + rAcc) + m.savings + passive + windfall;
                peakNw = Math.max(peakNw, balance);
            } else if (t === k) {
                // Transition year (Fractional retirement)
                const workFrac = delta;
                const retireFrac = 1 - delta;

                inflowData.push((m.income * workFrac) + passive + windfall);
                outflowData.push(-m.spending);

                const balanceMid = balance * Math.pow(1 + rAcc, workFrac) + (m.savings * workFrac) + (passive * workFrac) + (windfall * workFrac);
                balance = (balanceMid - m.spending * retireFrac + (passive * retireFrac) + (windfall * retireFrac)) * Math.pow(1 + rDec, retireFrac);
                peakNw = Math.max(peakNw, balanceMid, balance);
            } else {
                // Full retirement year
                inflowData.push(passive + windfall);
                outflowData.push(-m.spending);
                balance = (balance - m.spending + passive + windfall) * (1 + rDec);
                peakNw = Math.max(peakNw, balance);
            }
        }

        return { labels, inflowData, outflowData, nwData, finalBalance: balance, peakNw };
    }

    function updateSimulation() {
        if (!chartInstance) initChart();
        if (milestones.length === 0) return;

        const currentAge = parseInt(boxStartAge.value);
        const stopAge = parseInt(boxEndAge.value);
        const principal = parseFloat(boxPrincipal.value) || 0;
        const rAcc = (parseFloat(boxGrowth.value) || 0) / 100;
        const rDec = (parseFloat(boxGrowthDec.value) || 0) / 100;
        const floor = parseFloat(boxLegacyFloor.value) || 0;

        // Numerical Solver (Bisection)
        let w = 0;
        // We allow working up until the end of the final year
        const horizon = stopAge - currentAge;
        const resAtH = simulateLife(currentAge, stopAge, principal, rAcc, rDec, currentAge + horizon);
        const resAtStart = simulateLife(currentAge, stopAge, principal, rAcc, rDec, currentAge);

        if (resAtStart.finalBalance >= floor) {
            w = 0;
        } else if (resAtH.finalBalance < floor) {
            w = horizon;
        } else {
            let low = currentAge, high = currentAge + horizon;
            for (let i = 0; i < 60; i++) {
                let mid = (low + high) / 2;
                let test = simulateLife(currentAge, stopAge, principal, rAcc, rDec, mid);
                if (test.finalBalance < floor) low = mid;
                else high = mid;
            }
            w = ((low + high) / 2) - currentAge;
        }

        const rAge = currentAge + w;
        const finalSim = simulateLife(currentAge, stopAge, principal, rAcc, rDec, rAge);
        computedPeakCache = finalSim.peakNw;

        // Update Metrics
        mWorkYears.innerText = w.toFixed(1) + ' Years';
        if (w >= (stopAge - currentAge) && resAtH.finalBalance < floor) {
            mRetireAge.innerText = 'Never';
        } else {
            mRetireAge.innerText = 'Age ' + rAge.toFixed(1);
        }
        mPeakNw.innerText = formatCurrency(finalSim.peakNw);

        // Labels updates for context
        document.getElementById('label-principal').innerText = 'Starting Balance: ' + formatCurrency(principal);
        document.getElementById('label-growth').innerText = 'Real Growth Rate during accumulation: ' + (rAcc * 100).toFixed(1) + '%';
        document.getElementById('label-growth-dec').innerText = 'Real Growth Rate (Decumulation): ' + (rDec * 100).toFixed(1) + '%';
        document.getElementById('label-legacy-floor').innerText = 'Desired Legacy Floor: ' + formatCurrency(floor);

        // View Clamping
        let axisMin = boxAxisMin.value !== "" ? parseInt(boxAxisMin.value) : currentAge;
        let axisMax = boxAxisMax.value !== "" ? parseInt(boxAxisMax.value) : stopAge;
        let yMaxConstraint = boxYMax.value !== "" ? parseFloat(boxYMax.value) : undefined;

        const viewSim = simulateLife(currentAge, Math.max(stopAge, axisMax), principal, rAcc, rDec, rAge);

        chartInstance.data.labels = viewSim.labels;
        chartInstance.data.datasets[0].data = viewSim.inflowData;
        chartInstance.data.datasets[1].data = viewSim.outflowData;
        chartInstance.data.datasets[2].data = viewSim.nwData;

        chartInstance.options.scales.x.min = axisMin;
        chartInstance.options.scales.x.max = axisMax;
        chartInstance.options.scales.yNetWorth.max = yMaxConstraint;
        
        chartInstance.update('none'); // Use 'none' for instant reactive feel
        updateButtonStates();
        updateURLParams();
    }

    function updateURLParams() {
        const params = new URLSearchParams();
        params.set('startAge', boxStartAge.value);
        params.set('endAge', boxEndAge.value);
        params.set('principal', boxPrincipal.value);
        params.set('growth', boxGrowth.value);
        params.set('growthDec', boxGrowthDec.value);
        params.set('legacyFloor', boxLegacyFloor.value);
        params.set('linked', ratesLinked);
        params.set('ssAmt', boxSsAmt.value);
        params.set('ssAge', boxSsAge.value);
        params.set('windfallAmt', boxWindfallAmt.value);
        params.set('windfallAge', boxWindfallAge.value);
        if(boxAxisMin.value !== "") params.set('xMin', boxAxisMin.value);
        if(boxAxisMax.value !== "") params.set('xMax', boxAxisMax.value);
        if(boxYMax.value !== "") params.set('yMax', boxYMax.value);
        
        // Compact milestones for URL: [age, income, savings, spending]
        const mData = milestones.map(m => [m.age, m.income, m.savings, m.spending]);
        params.set('m', JSON.stringify(mData));
        
        const newUrl = `${window.location.pathname}?${params.toString()}`;
        window.history.replaceState({}, '', newUrl);
    }

    function loadParamsFromURL() {
        const params = new URLSearchParams(window.location.search);
        if (params.has('startAge')) boxStartAge.value = sliderStartAge.value = params.get('startAge');
        if (params.has('endAge')) boxEndAge.value = sliderEndAge.value = params.get('endAge');
        if (params.has('principal')) boxPrincipal.value = inputPrincipal.value = params.get('principal');
        if (params.has('growth')) boxGrowth.value = inputGrowth.value = params.get('growth');
        if (params.has('growthDec')) boxGrowthDec.value = inputGrowthDec.value = params.get('growthDec');
        if (params.has('legacyFloor')) boxLegacyFloor.value = sliderLegacyFloor.value = params.get('legacyFloor');
        if (params.has('xMin')) boxAxisMin.value = params.get('xMin');
        if (params.has('xMax')) boxAxisMax.value = params.get('xMax');
        if (params.has('yMax')) boxYMax.value = params.get('yMax');
        if (params.has('ssAmt')) boxSsAmt.value = params.get('ssAmt');
        if (params.has('ssAge')) boxSsAge.value = params.get('ssAge');
        if (params.has('windfallAmt')) boxWindfallAmt.value = params.get('windfallAmt');
        if (params.has('windfallAge')) boxWindfallAge.value = params.get('windfallAge');
        
        if (params.get('linked') === 'true') {
            ratesLinked = true;
            btnLinkRates.textContent = "Rates Linked";
            btnLinkRates.classList.add('locked');
            inputGrowthDec.disabled = boxGrowthDec.disabled = true;
        }

        if (boxAxisMin.value !== "" || boxAxisMax.value !== "" || boxYMax.value !== "") {
            mainLockBtn.textContent = "Unlock Auto-Scale";
            mainLockBtn.classList.add('locked');
        }

        if (params.has('m')) {
            try {
                const mData = JSON.parse(params.get('m'));
                milestones = mData.map(m => ({
                    id: Math.random().toString(36).substr(2, 9),
                    age: m[0],
                    income: m[1],
                    savings: m[2],
                    spending: m[3]
                }));
            } catch (e) { console.error("Failed to parse milestones from URL", e); }
        }
    }

    function linkInputs(slider, box, labelUpdateFn) {
        slider.addEventListener('input', () => {
            box.value = slider.value;
            if (labelUpdateFn) labelUpdateFn(slider.value);
            updateSimulation();
        });
        box.addEventListener('change', () => {
            if (box.value === "") box.value = slider.value;
            slider.value = box.value;
            if (labelUpdateFn) labelUpdateFn(box.value);
            updateSimulation();
        });
    }

    btnAdvanced.addEventListener('click', () => {
        btnAdvanced.classList.toggle('open');
        panelAdvanced.classList.toggle('visible');
    });

    btnLinkRates.addEventListener('click', () => {
        ratesLinked = !ratesLinked;
        if (ratesLinked) {
            btnLinkRates.textContent = "Rates Linked";
            btnLinkRates.classList.add('locked');
            
            boxGrowthDec.value = boxGrowth.value;
            inputGrowthDec.value = inputGrowth.value;
            inputGrowthDec.disabled = true;
            boxGrowthDec.disabled = true;
        } else {
            btnLinkRates.textContent = "Link to Accumulation";
            btnLinkRates.classList.remove('locked');
            inputGrowthDec.disabled = false;
            boxGrowthDec.disabled = false;
        }
        updateSimulation();
    });

    function updateButtonStates() {
        if (boxAxisMin.value !== "" || boxAxisMax.value !== "") {
            btnLockX.textContent = "Unlock Auto";
            btnLockX.classList.add('locked');
        } else {
            btnLockX.textContent = "Lock Current";
            btnLockX.classList.remove('locked');
        }

        if (boxYMax.value !== "") {
            btnLockY.textContent = "Unlock Auto";
            btnLockY.classList.add('locked');
        } else {
            btnLockY.textContent = "Lock Current";
            btnLockY.classList.remove('locked');
        }
    }

    btnLockX.addEventListener('click', () => {
        if (boxAxisMin.value !== "" || boxAxisMax.value !== "") {
            boxAxisMin.value = "";
            boxAxisMax.value = "";
        } else {
            boxAxisMin.value = parseInt(boxStartAge.value) || 0;
            boxAxisMax.value = parseInt(boxEndAge.value) || 95;
        }
        updateSimulation();
    });

    btnLockY.addEventListener('click', () => {
        if (boxYMax.value !== "") {
            boxYMax.value = "";
        } else if (computedPeakCache > 0) {
            const rawPeak = computedPeakCache;
            let snappedCeiling = Math.round(rawPeak);
            if (rawPeak >= 1000000) snappedCeiling = Math.ceil(rawPeak / 250000) * 250000;
            else if (rawPeak >= 250000) snappedCeiling = Math.ceil(rawPeak / 50000) * 50000;
            else snappedCeiling = Math.ceil(rawPeak / 10000) * 10000;
            boxYMax.value = snappedCeiling;
        }
        updateSimulation();
    });

    mainLockBtn.addEventListener('click', () => {
        // If either X or Y is currently unlocked, lock everything to current view
        if (boxAxisMin.value === "" || boxAxisMax.value === "" || boxYMax.value === "") {
            boxAxisMin.value = parseInt(boxStartAge.value) || 0;
            boxAxisMax.value = parseInt(boxEndAge.value) || 95;
            
            if (computedPeakCache > 0) {
                const rawPeak = computedPeakCache;
                let snappedCeiling = Math.round(rawPeak);
                if (rawPeak >= 1000000) snappedCeiling = Math.ceil(rawPeak / 250000) * 250000;
                else if (rawPeak >= 250000) snappedCeiling = Math.ceil(rawPeak / 50000) * 50000;
                else snappedCeiling = Math.ceil(rawPeak / 10000) * 10000;
                boxYMax.value = snappedCeiling;
            }
            mainLockBtn.textContent = "Unlock Auto-Scale";
            mainLockBtn.classList.add('locked');
        } else {
            boxAxisMin.value = "";
            boxAxisMax.value = "";
            boxYMax.value = "";
            mainLockBtn.textContent = "Lock Scale for Comparison";
            mainLockBtn.classList.remove('locked');
        }
        updateSimulation();
    });

    function createMilestoneUI(milestone) {
        const block = document.createElement('div');
        block.className = 'milestone-block';
        block.dataset.id = milestone.id;

        block.innerHTML = `
            <div class="milestone-header">
                <div class="milestone-title">Event Milestone</div>
                <button class="btn-delete" onclick="removeMilestone('${milestone.id}')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>
            <div class="input-row">
                <div class="control-group">
                    <label class="control-label">Start Age</label>
                    <input type="number" class="inp-age" value="${milestone.age}" min="0" max="120">
                </div>
                <div class="control-group">
                    <label class="control-label">Gross Income</label>
                    <input type="number" class="inp-income" value="${milestone.income}" step="1000">
                </div>
            </div>
            <div class="input-row">
                <div class="control-group">
                    <label class="control-label">Lifestyle Spending</label>
                    <input type="number" class="inp-spending" value="${milestone.spending}" step="1000">
                </div>
                <div class="control-group">
                    <label class="control-label">Annual Savings</label>
                    <input type="number" class="inp-savings" value="${milestone.savings}" step="1000">
                </div>
            </div>
        `;

        // Bind linked math logic (I = S + C)
        const inpAge = block.querySelector('.inp-age');
        const inpIncome = block.querySelector('.inp-income');
        const inpSpending = block.querySelector('.inp-spending');
        const inpSavings = block.querySelector('.inp-savings');

        inpAge.addEventListener('change', () => syncDataAndSort());
        
        inpIncome.addEventListener('input', () => {
            // Adjust savings when income moves
            inpSavings.value = Math.max(0, inpIncome.value - inpSpending.value);
            syncDataAndSort();
        });

        inpSpending.addEventListener('input', () => {
            // Adjust savings when spending moves
            inpSavings.value = Math.max(0, inpIncome.value - inpSpending.value);
            syncDataAndSort();
        });

        inpSavings.addEventListener('input', () => {
            // Keeping Income fixed and letting Spending absorb the change per fallback logic
            inpSpending.value = Math.max(0, inpIncome.value - inpSavings.value);
            syncDataAndSort();
        });

        return block;
    }

    function addMilestone(age = 30, income = 60000, savings = 15000, spending = 45000) {
        const milestone = {
            id: Math.random().toString(36).substr(2, 9),
            age: age,
            income: income,
            savings: savings,
            spending: spending
        };
        
        milestones.push(milestone);
        renderMilestones();
    }

    function removeMilestone(id) {
        if (milestones.length <= 1) return; // Keep at least one milestone
        milestones = milestones.filter(m => m.id !== id);
        renderMilestones();
    }

    function syncDataAndSort() {
        // 1. Capture current values from DOM
        const blocks = document.querySelectorAll('.milestone-block');
        const updatedMilestones = [];

        blocks.forEach(block => {
            updatedMilestones.push({
                id: block.dataset.id,
                age: parseInt(block.querySelector('.inp-age').value) || 0,
                income: parseFloat(block.querySelector('.inp-income').value) || 0,
                spending: parseFloat(block.querySelector('.inp-spending').value) || 0,
                savings: parseFloat(block.querySelector('.inp-savings').value) || 0
            });
        });

        // 2. Sort chronologically
        updatedMilestones.sort((a, b) => a.age - b.age);
        
        // 3. Update global state
        milestones = updatedMilestones;
        
        // 4. Update Simulation
        updateSimulation();
    }

    function renderMilestones() {
        // Preserve current scroll position
        const scrollPos = milestoneContainer.parentElement.scrollTop;
        
        milestoneContainer.innerHTML = '';
        
        // Sort before rendering to ensure DOM matches state
        milestones.sort((a, b) => a.age - b.age);

        milestones.forEach(m => {
            milestoneContainer.appendChild(createMilestoneUI(m));
        });

        milestoneContainer.parentElement.scrollTop = scrollPos;
        updateSimulation();
    }

    addEventBtn.addEventListener('click', () => {
        // Default to adding a milestone 10 years after the last one
        const lastAge = milestones.length > 0 ? milestones[milestones.length - 1].age : 30;
        const lastIncome = milestones.length > 0 ? milestones[milestones.length - 1].income : 60000;
        const lastSpending = milestones.length > 0 ? milestones[milestones.length - 1].spending : 45000;
        const lastSavings = milestones.length > 0 ? milestones[milestones.length - 1].savings : 15000;
        
        addMilestone(lastAge + 10, lastIncome, lastSavings, lastSpending);
    });

    const formatCurrency = (num) => '$' + Math.round(num).toLocaleString();

    linkInputs(sliderStartAge, boxStartAge);
    linkInputs(sliderEndAge, boxEndAge);
    linkInputs(inputPrincipal, boxPrincipal, (val) => {
        document.getElementById('label-principal').innerText = 'Starting Balance: ' + formatCurrency(val);
    });
    linkInputs(inputGrowth, boxGrowth, (val) => {
        document.getElementById('label-growth').innerText = 'Real Growth Rate during accumulation: ' + parseFloat(val).toFixed(1) + '%';
        if (ratesLinked) {
            inputGrowthDec.value = boxGrowthDec.value = val;
            document.getElementById('label-growth-dec').innerText = 'Real Growth Rate (Decumulation): ' + parseFloat(val).toFixed(1) + '%';
        }
    });
    linkInputs(inputGrowthDec, boxGrowthDec, (val) => {
        document.getElementById('label-growth-dec').innerText = 'Real Growth Rate (Decumulation): ' + parseFloat(val).toFixed(1) + '%';
    });
    linkInputs(sliderLegacyFloor, boxLegacyFloor, (val) => {
        document.getElementById('label-legacy-floor').innerText = 'Desired Legacy Floor: ' + formatCurrency(val);
    });

    // Set initial labels
    document.getElementById('label-principal').innerText = 'Starting Balance: ' + formatCurrency(boxPrincipal.value);
    document.getElementById('label-growth').innerText = 'Real Growth Rate during accumulation: ' + parseFloat(boxGrowth.value).toFixed(1) + '%';
    document.getElementById('label-growth-dec').innerText = 'Real Growth Rate (Decumulation): ' + parseFloat(boxGrowthDec.value).toFixed(1) + '%';
    document.getElementById('label-legacy-floor').innerText = 'Desired Legacy Floor: ' + formatCurrency(boxLegacyFloor.value);

    boxAxisMin.addEventListener('change', updateSimulation);
    boxAxisMax.addEventListener('change', updateSimulation);
    boxYMax.addEventListener('change', updateSimulation);

    boxSsAmt.addEventListener('change', updateSimulation);
    boxSsAge.addEventListener('change', updateSimulation);
    boxWindfallAmt.addEventListener('change', updateSimulation);
    boxWindfallAge.addEventListener('change', updateSimulation);

    // Initialize
    loadParamsFromURL();
    if (milestones.length === 0) {
        addMilestone(30, 60000, 15000, 45000);
    } else {
        renderMilestones();
    }
</script>
</body>
</html>
