<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Plot Labs - Retirement Timeline Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1050px;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            color: var(--text-main);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .metric-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .metric-card.blue .metric-value {
            color: var(--accent-blue);
        }

        .layout-split {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 900px) {
            .layout-split {
                grid-template-columns: 1.1fr 1fr;
            }
        }

        .chart-container {
            position: relative;
            height: 430px;
            width: 100%;
            background-color: rgba(15, 23, 42, 0.2);
            border-radius: 8px;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid var(--border);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: rgba(15, 23, 42, 0.3);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            max-height: 580px;
            overflow-y: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .interactive-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .interactive-row input[type="range"] {
            flex: 1;
        }

        .interactive-row .manual-box {
            width: 110px;
            flex-shrink: 0;
            text-align: left;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-blue);
            cursor: pointer;
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        input[type="number"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        
        input[type="number"]:focus {
            border-color: var(--accent-blue);
        }

        .advanced-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(51, 65, 85, 0.3);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            user-select: none;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .advanced-toggle:hover {
            background: rgba(51, 65, 85, 0.5);
        }

        .advanced-toggle .chevron {
            transition: transform 0.2s ease;
            width: 12px;
            height: 12px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .advanced-toggle.open .chevron {
            transform: rotate(180deg);
        }

        .advanced-content {
            display: none;
            flex-direction: column;
            gap: 16px;
            border: 1px dashed var(--border);
            padding: 14px;
            border-radius: 6px;
            background: rgba(15, 23, 42, 0.2);
        }

        .advanced-content.visible {
            display: flex;
        }

        /* ADVANCED FLEX & GRID ROW ENGINE */
        .advanced-row-x {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            width: 100%;
        }

        .x-input-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex: 1; /* Occupies all available space leftover by the lock button */
        }

        .advanced-row-y {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            width: 100%;
        }

        .y-input-wrap {
            flex: 1; /* Maximizes input field dimensions to accommodate large balances */
        }

        .btn-lock {
            background-color: var(--accent-blue);
            color: var(--text-main);
            border: none;
            padding: 7px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            height: 35px;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
            width: 115px;
            text-align: center;
            flex-shrink: 0;
        }

        .btn-lock:hover {
            background-color: #2563eb;
        }

        .btn-lock.locked {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .btn-lock.locked:hover {
            background-color: rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Money Plot Labs: The Pure Math of Freedom</h2>
    
    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-label">Working Years Needed</div>
            <div id="metric-work-years" class="metric-value">0.0 Years</div>
        </div>
        <div class="metric-card blue">
            <div class="metric-label">Retirement Age Target</div>
            <div id="metric-retire-age" class="metric-value">Age --</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Peak Nest Egg Needed</div>
            <div id="metric-peak-nw" class="metric-value">$0</div>
        </div>
    </div>

    <div class="layout-split">
        <div class="chart-container">
            <canvas id="timelineChart"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label class="control-label">Current Age</label>
                <div class="interactive-row">
                    <input type="range" id="slider-start-age" min="0" max="120" value="20">
                    <input type="number" id="box-start-age" class="manual-box" min="0" max="120" value="20">
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">Life Expectancy</label>
                <div class="interactive-row">
                    <input type="range" id="slider-end-age" min="0" max="120" value="95">
                    <input type="number" id="box-end-age" class="manual-box" min="0" max="120" value="95">
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">Starting Balance ($)</label>
                <div class="interactive-row">
                    <input type="range" id="input-principal" min="0" max="1000000" step="5000" value="0">
                    <input type="number" id="box-principal" class="manual-box" min="0" step="any" value="0" placeholder="$">
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">Annual Savings ($/yr)</label>
                <div class="interactive-row">
                    <input type="range" id="input-savings" min="0" max="100000" step="1000" value="10000">
                    <input type="number" id="box-savings" class="manual-box" min="0" step="any" value="10000">
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">Annual Retirement Spending ($/yr)</label>
                <div class="interactive-row">
                    <input type="range" id="input-spending" min="5000" max="100000" step="1000" value="50000">
                    <input type="number" id="box-spending" class="manual-box" min="0" step="any" value="50000">
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">Real Growth Rate (%)</label>
                <div class="interactive-row">
                    <input type="range" id="input-growth" min="0.0" max="10.0" step="0.1" value="3.0">
                    <input type="number" id="box-growth" class="manual-box" step="any" value="3.0">
                </div>
            </div>

            <div class="advanced-toggle" id="advanced-button">
                <span>Advanced Options</span>
                <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            
            <div class="advanced-content" id="advanced-panel">
                <!-- Balanced X-Axis Layout: Inputs split leftover space perfectly -->
                <div class="advanced-row-x">
                    <div class="x-input-pair">
                        <div class="control-group">
                            <label class="control-label">Chart Min Age</label>
                            <input type="number" id="box-axis-min" min="0" max="100" value="" placeholder="Auto (Age)">
                        </div>
                        <div class="control-group">
                            <label class="control-label">Chart Max Age</label>
                            <input type="number" id="box-axis-max" min="30" max="150" value="" placeholder="Auto (Expectancy)">
                        </div>
                    </div>
                    <button class="btn-lock" id="btn-lock-x" title="Toggle horizontal age bounds lock">Lock Current</button>
                </div>

                <!-- Expanded Y-Axis Layout: Larger field prevents truncated strings -->
                <div class="advanced-row-y">
                    <div class="control-group y-input-wrap">
                        <label class="control-label">Chart Max Net Worth ($)</label>
                        <input type="number" id="box-y-max" value="" placeholder="Auto (Peak Net Worth)">
                    </div>
                    <button class="btn-lock" id="btn-lock-y" title="Toggle vertical net worth bounds lock">Lock Current</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const sliderStartAge = document.getElementById('slider-start-age');
    const boxStartAge = document.getElementById('box-start-age');
    const sliderEndAge = document.getElementById('slider-end-age');
    const boxEndAge = document.getElementById('box-end-age');
    
    const inputPrincipal = document.getElementById('input-principal');
    const inputSavings = document.getElementById('input-savings');
    const inputSpending = document.getElementById('input-spending');
    const inputGrowth = document.getElementById('input-growth');

    const boxPrincipal = document.getElementById('box-principal');
    const boxSavings = document.getElementById('box-savings');
    const boxSpending = document.getElementById('box-spending');
    const boxGrowth = document.getElementById('box-growth');

    const btnAdvanced = document.getElementById('advanced-button');
    const panelAdvanced = document.getElementById('advanced-panel');
    const boxAxisMin = document.getElementById('box-axis-min');
    const boxAxisMax = document.getElementById('box-axis-max');
    const boxYMax = document.getElementById('box-y-max');
    
    const btnLockX = document.getElementById('btn-lock-x');
    const btnLockY = document.getElementById('btn-lock-y');

    const mWorkYears = document.getElementById('metric-work-years');
    const mRetireAge = document.getElementById('metric-retire-age');
    const mPeakNw = document.getElementById('metric-peak-nw');

    let chartInstance = null;
    let computedPeakCache = 0;
    const formatCurrency = (num) => '$' + Math.round(num).toLocaleString();

    btnAdvanced.addEventListener('click', () => {
        btnAdvanced.classList.toggle('open');
        panelAdvanced.classList.toggle('visible');
    });

    btnLockX.addEventListener('click', () => {
        if (boxAxisMin.value !== "" || boxAxisMax.value !== "") {
            boxAxisMin.value = "";
            boxAxisMax.value = "";
        } else {
            boxAxisMin.value = parseInt(boxStartAge.value) || 0;
            boxAxisMax.value = parseInt(boxEndAge.value) || 95;
        }
        updateVisualization();
    });

    btnLockY.addEventListener('click', () => {
        if (boxYMax.value !== "") {
            boxYMax.value = "";
        } else if (computedPeakCache > 0) {
            boxYMax.value = Math.round(computedPeakCache);
        }
        updateVisualization();
    });

    function updateButtonStates() {
        if (boxAxisMin.value !== "" || boxAxisMax.value !== "") {
            btnLockX.textContent = "Unlock Auto";
            btnLockX.classList.add('locked');
        } else {
            btnLockX.textContent = "Lock Current";
            btnLockX.classList.remove('locked');
        }

        if (boxYMax.value !== "") {
            btnLockY.textContent = "Unlock Auto";
            btnLockY.classList.add('locked');
        } else {
            btnLockY.textContent = "Lock Current";
            btnLockY.classList.remove('locked');
        }
    }

    function updateURLParams() {
        const params = new URLSearchParams();
        params.set('startAge', boxStartAge.value);
        params.set('endAge', boxEndAge.value);
        params.set('principal', boxPrincipal.value);
        params.set('savings', boxSavings.value);
        params.set('spending', boxSpending.value);
        params.set('growth', boxGrowth.value);
        if(boxAxisMin.value !== "") params.set('xMin', boxAxisMin.value);
        if(boxAxisMax.value !== "") params.set('xMax', boxAxisMax.value);
        if(boxYMax.value !== "") params.set('yMax', boxYMax.value);
        
        const newUrl = `${window.location.pathname}?${params.toString()}`;
        window.history.replaceState({}, '', newUrl);
    }

    function loadParamsFromURL() {
        const params = new URLSearchParams(window.location.search);
        if (params.has('startAge')) boxStartAge.value = sliderStartAge.value = params.get('startAge');
        if (params.has('endAge')) boxEndAge.value = sliderEndAge.value = params.get('endAge');
        if (params.has('principal')) boxPrincipal.value = inputPrincipal.value = params.get('principal');
        if (params.has('savings')) boxSavings.value = inputSavings.value = params.get('savings');
        if (params.has('spending')) boxSpending.value = inputSpending.value = params.get('spending');
        if (params.has('growth')) boxGrowth.value = inputGrowth.value = params.get('growth');
        if (params.has('xMin')) boxAxisMin.value = params.get('xMin');
        if (params.has('xMax')) boxAxisMax.value = params.get('xMax');
        if (params.has('yMax')) boxYMax.value = params.get('yMax');
    }

    function evaluateEndingBalance(w, totalHorizon, p0, c, b, r) {
        let balance = p0;
        for (let year = 1; year <= totalHorizon; year++) {
            if (year <= w) {
                balance = balance * (1 + r) + c;
            } else {
                balance = balance * (1 + r) - b;
            }
        }
        return balance;
    }

    function calculateTimeline(startAge, endAge, p0, c, b, r) {
        const totalHorizon = endAge - startAge;
        let w = 0;

        if (totalHorizon <= 0) {
            return { workingYears: 0, retirementAge: startAge, peakNetWorth: p0, accumulationData: [], depletionData: [] };
        }

        if (r === 0) {
            w = (b * totalHorizon - p0) / (c + b);
        } else {
            const compoundHorizon = Math.pow(1 + r, totalHorizon);
            const numerator = (r * p0 + c) * compoundHorizon + b;
            const denominator = c + b;
            
            if (numerator / denominator <= 0) {
                w = 0;
            } else {
                w = totalHorizon - (Math.log(numerator / denominator) / Math.log(1 + r));
            }
        }

        w = Math.max(0, Math.min(totalHorizon, w));
        if (isNaN(w)) w = totalHorizon;

        const accumulationData = [];
        const depletionData = [];
        
        let peakNetWorth = 0;
        if (r === 0) {
            peakNetWorth = p0 + (c * w);
        } else {
            peakNetWorth = p0 * Math.pow(1 + r, w) + c * (Math.pow(1 + r, w) - 1) / r;
        }

        for (let i = 0; i <= totalHorizon; i++) {
            const currentAgePos = startAge + i;

            if (i <= w) {
                let bal = 0;
                if (r === 0) {
                    bal = p0 + (c * i);
                } else {
                    bal = p0 * Math.pow(1 + r, i) + c * (Math.pow(1 + r, i) - 1) / r;
                }
                accumulationData.push({ x: currentAgePos, y: bal });
            } 
            
            if (i >= Math.floor(w)) {
                const yearsRetired = i - w;
                let bal = 0;
                if (r === 0) {
                    bal = peakNetWorth - (b * yearsRetired);
                } else {
                    bal = peakNetWorth * Math.pow(1 + r, yearsRetired) - b * (Math.pow(1 + r, yearsRetired) - 1) / r;
                }
                depletionData.push({ x: currentAgePos, y: Math.max(0, bal) });
            }
        }

        return {
            workingYears: w,
            retirementAge: startAge + w,
            peakNetWorth: peakNetWorth,
            accumulationData: accumulationData,
            depletionData: depletionData
        };
    }

    function updateVisualization() {
        let startAge = parseInt(boxStartAge.value) || 0;
        let endAge = parseInt(boxEndAge.value) || 95;
        
        let axisMin = boxAxisMin.value !== "" ? parseInt(boxAxisMin.value) : startAge;
        let axisMax = boxAxisMax.value !== "" ? parseInt(boxAxisMax.value) : endAge;

        if (isNaN(axisMin)) axisMin = startAge;
        if (isNaN(axisMax)) axisMax = endAge;

        if (axisMin >= axisMax) {
            axisMax = axisMin + 10;
            if(boxAxisMax.value !== "") boxAxisMax.value = axisMax;
        }

        if (startAge >= endAge) {
            endAge = startAge + 1;
            if(endAge > 120) {
                endAge = 120;
                startAge = 119;
                boxStartAge.value = startAge;
                sliderStartAge.value = startAge;
            }
            boxEndAge.value = endAge;
            sliderEndAge.value = endAge;
        }

        const p0 = parseFloat(boxPrincipal.value) || 0;
        const c = parseFloat(boxSavings.value) || 0;
        const b = parseFloat(boxSpending.value) || 0;
        const r = (parseFloat(boxGrowth.value) || 0) / 100;

        const results = calculateTimeline(startAge, endAge, p0, c, b, r);
        computedPeakCache = results.peakNetWorth;

        mWorkYears.innerText = results.workingYears.toFixed(1) + ' Years';
        mRetireAge.innerText = results.workingYears === (endAge - startAge) && evaluateEndingBalance(endAge - startAge, endAge - startAge, p0, c, b, r) < 0 ? 'Never' : 'Age ' + results.retirementAge.toFixed(1);
        mPeakNw.innerText = formatCurrency(results.peakNetWorth);

        let yMaxConstraint = boxYMax.value !== "" ? parseFloat(boxYMax.value) : undefined;

        if (chartInstance) {
            chartInstance.data.datasets[0].data = results.accumulationData;
            chartInstance.data.datasets[1].data = results.depletionData;
            chartInstance.options.scales.x.min = axisMin;
            chartInstance.options.scales.x.max = axisMax;
            chartInstance.options.scales.y.max = yMaxConstraint;
            chartInstance.update('none');
        } else {
            const ctx = document.getElementById('timelineChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'Accumulation Phase',
                            data: results.accumulationData,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.08)',
                            fill: true,
                            tension: 0.1,
                            borderWidth: 3,
                            pointRadius: 0
                        },
                        {
                            label: 'Depletion Phase',
                            data: results.depletionData,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.08)',
                            fill: true,
                            tension: 0.1,
                            borderWidth: 3,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#f8fafc' } },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                title: (context) => 'Age ' + context[0].parsed.x,
                                label: (context) => context.raw !== null ? context.dataset.label + ': ' + formatCurrency(context.parsed.y) : null
                            }
                        }
                    },
                    scales: {
                        x: { 
                            type: 'linear',  
                            min: axisMin,          
                            max: axisMax,        
                            grid: { color: '#334155' }, 
                            ticks: { 
                                color: '#94a3b8', 
                                stepSize: 10,
                                callback: (v) => 'Age ' + v
                            } 
                        },
                        y: { 
                            min: 0, 
                            max: yMaxConstraint,
                            grid: { color: '#334155' }, 
                            ticks: { 
                                color: '#94a3b8',
                                callback: (v) => v >= 1000000 ? '$' + (v / 1000000).toFixed(1) + 'M' : v >= 1000 ? '$' + (v / 1000) + 'k' : '$' + v
                            } 
                        }
                    }
                }
            });
        }
        updateButtonStates();
        updateURLParams();
    }

    function linkInputs(slider, box) {
        slider.addEventListener('input', () => {
            box.value = slider.value;
            updateVisualization();
        });
        box.addEventListener('change', () => {
            if (box.value === "") box.value = slider.value;
            slider.value = box.value;
            updateVisualization();
        });
    }

    linkInputs(sliderStartAge, boxStartAge);
    linkInputs(sliderEndAge, boxEndAge);
    linkInputs(inputPrincipal, boxPrincipal);
    linkInputs(inputSavings, boxSavings);
    linkInputs(inputSpending, boxSpending);
    linkInputs(inputGrowth, boxGrowth);

    boxAxisMin.addEventListener('change', updateVisualization);
    boxAxisMax.addEventListener('change', updateVisualization);
    boxYMax.addEventListener('change', updateVisualization);

    loadParamsFromURL();
    updateVisualization();
</script>

</body>
</html>
